<section class="dashboard">

  <header class="dashboard__header">
    <h2 class="dashboard__title">
      Lifeline Multispeciality Hospital
    </h2>
    <p class="dashboard__subtitle">
      Select a service to proceed
    </p>
  </header>

  <div class="dashboard__grid">
    @for (item of services; track item.name) {
      <div
        class="dashboard__card"
        [routerLink]="!item.disabled ? item.link : null"
        [class.dashboard__card--disabled]="item.disabled"
        [style.borderBottomColor]="item.color"
      >
        <span class="dashboard__icon">
          {{ item.icon }}
        </span>

        <h3 class="dashboard__card-title">
          {{ item.name }}
        </h3>

        @if (item.disabled) {
          <p class="dashboard__coming-soon">
            Coming Soon
          </p>
        }
      </div>
    }
  </div>

  <button
    routerLink="/welcome"
    class="dashboard__logout-btn"
  >
    Logout
  </button>

</section>
